<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXARY - 웹툰 추천</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f8f8f8;
        }

        /* 왼쪽 5/3 영역 (남색 배경) */
        .left-section {
            width: 60%;
            background-color: rgb(0, 0, 70);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: hidden;
        }

        /* 문구 스타일 */
        .quotes {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            max-width: 80%;
            min-height: 120px;
        }

        /* 애니메이션 텍스트 */
        .quote {
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid white; /* 커서 효과 */
            font-size: 20px;
            font-weight: bold;
        }

        /* 글자 색상 */
        .blue-text { color: lightblue; }
        .red-text { color: #ff5757; }
        .green-text { color: #6dd56d; }
        .pink-text { color: #ff66b2; }

        /* 오른쪽 5/2 영역 (버튼 배치) */
        .right-section {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: white;
            padding: 20px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* 버튼을 가로 정렬하는 컨테이너 */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px; /* 버튼 사이 간격 */
            margin-bottom: 10px;
        }

        .btn {
            width: 120px;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
        }

        .btn-login {
            background-color: #81009b;
            color: white;
        }

        .btn-signup {
            background-color: #81009b;
            color: white;
        }

        .btn-login:hover, .btn-signup:hover {
            opacity: 0.8;
        }

        .guest-link {
            margin-top: 10px;
            color: gray;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            display: block;
            text-align: center;
        }

        .guest-link:hover {
            text-decoration: underline;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>


<body>
    <!-- 왼쪽 추천 웹툰 문구 (타이핑 애니메이션 적용) -->
    <div class="left-section">
        <div class="quotes">
            <span class="quote blue-text" id="quote"></span>
        </div>
    </div>

    <!-- 오른쪽 버튼 섹션 -->
    <div class="right-section">
        <h2>시작하기</h2>
        
        <!-- 버튼을 가로 정렬 -->
        <div class="button-container">
            <a href="/account/login/" class="btn btn-login">로그인</a>
            <a href="/account/signup/" class="btn btn-signup">회원 가입</a>
        </div>

        <a href="/basic_chatbot_na/" class="guest-link">비회원 이용</a>
        <div class="footer">PIXARY</div>
    </div>

    <!-- 타이핑 애니메이션 JavaScript -->
    <script>
        const quotes = [
            '"이 몸이 직접 고른 웹툰이다. 감히 거절할 생각은 하지 마!"',
            '"영애, 북부의 혹독한 추위에도 불꽃처럼 타오르는 이 이야기 한 번 살펴보시겠습니까?"',
            '"첫사랑이 나오는 웹소설을 찾는다고요? ...하아, 왜 하필 첫사랑이죠?"',
            '"강자가 법이요, 힘이 정의다. 약자가 무슨 말을 보태겠느냐?"',
            '"우리, 할 얘기가 있지 않아요? 오늘 저녁 어때요."'
        ];

        let currentQuoteIndex = 0;
        let quoteElement = document.getElementById("quote");
        let text = "";
        let charIndex = 0;
        let typingSpeed = 50; // 타이핑 속도 (밀리초)

        function typeText() {
            if (charIndex < text.length) {
                quoteElement.innerHTML += text.charAt(charIndex);
                charIndex++;
                setTimeout(typeText, typingSpeed);
            } else {
                setTimeout(nextQuote, 2000); // 2초 대기 후 다음 문구 출력
            }
        }

        function nextQuote() {
            quoteElement.innerHTML = ""; // 이전 문구 삭제
            currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length; // 다음 문구로 변경
            text = quotes[currentQuoteIndex]; // 새 문구 가져오기
            charIndex = 0;
            typeText();
        }

        // 첫 번째 문장 시작
        text = quotes[currentQuoteIndex];
        typeText();
    </script>

</body>


</html>
